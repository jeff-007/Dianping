
server {
    server_name www.shanmao.site shanmao.site;

    root /var/www/dianping/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Add API Proxy configuration
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.shanmao.site/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.shanmao.site/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = shanmao.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = www.shanmao.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name www.shanmao.site shanmao.site;
    return 404; # managed by Certbot
}
